samples:
    ########### start fill ###
    # list of lanes to use. format as fastq/V350094071_L04, leave blank if start from split.read.fq.gz,
    # in the format of *_1.fq.gz
    lanes: [V350132145]
    name: "V350132145"
    ########### end fill ###

    # specifies expected location of split reads [data/split_read.1.fq.gz, data/split_read.2.fq.gz] for PE
    # SE read treated as read2
    fastq: [data/split_read.1.fq.gz, data/split_read.2.fq.gz]
    # path for reads.fq.gz before splitting, leave blank if start from split.read.fq.gz,
    fq_path: "../fastq"
    # sample or id to use for generating targets
    id: "data"
    # Chromosomes to evaluate for fragment length and phasing
    # Leave empty for cDNA/mRNA ref or if there are too many chromosomes to specify or you're unsure
    chroms: [chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8, chr9, chr10, chr11, chr12, chr13, chr14, chr15, chr16, chr17, chr18, chr19, chr20, chr21, chr22, chrX, chrY]

modules:
    ### start fill ### for standard analysis set True: BCsplit, mapping, LFR, eval_metrics
    BCsplit: True
    mapping: True
    # stLFR-specific fragment analyses
    LFR: True
    eval_metrics: True
    variant_calling: False
    phasing: False
    benchmarking: False
    # BCgDNA: stLFR bc followed by gDNA analysis (overrides other modules)
    BCgDNA: False
    ### end fill ###

    mate_pair_analysis: False
    read_overlap_analysis: False
    duplicate_plot: False
    umi_analysis: False

params:
    ########### start fill ###
    correct_rc: True
    mrna_mapper: 'star'
    library_species: 'human'
    ref_id: ''
    library_type: 'gdna'
    sequence_type: 'pe'
    # stLFR: use 'standard'; variants: 'standard_ac_swap', 'standard_gc_swap', 'pcrfree', 'BCgDNA'
    bc_condition: 'standard'
    total_r2_len: 100
    total_r1_len: 0
    bc_start: 0
    # stLFR BC length (42bp)
    sbc_len: 42
    # not used for stLFR
    cbc_len: 0
    gdna_start: 1
    read_len: 100
    gdna_start_r1: 1
    read_len_r1: 100
    additional_bc_start: 0
    additional_bc_len: 0
    additional_bc_len_r1: 0
    adapter_len: 0
    ########### end fill ###

    splitNfq: 32
    is_fulllane_unfiltered: True
    bwa_mem: 'mem'
    gc_swap: False
    platform: "BGI-seq"
    barcode: "/barcode.list"
    barcode_RC: "/barcode_RC.list"
    barcode_GCswap: "/barcode.GCswap.list"
    barcode_RC_GCswap: "/barcode_RC.GCswap.list"
    enforced_bc_list: ""

    ref_fa: "/path/to/hg38/GCA_000001405.15_GRCh38_no_alt_analysis_set.fa"
    ref_fa_mrna: "/path/to/hg38/GRCh38_latest_rna.fna.ercc.fasta"
    ref_fa_other: "/path/to/ref/other.fa"
    toolsdir: "/path/to/CGI_WGS_Pipeline/Data_and_Tools"
    src_dir: "/path/to/CGI_LFR_pipeline/"
    gatk_install: "/path/to/gatk"
    calc_frag_python: "/path/to/python"
    dbsnp_path: "/path/to/dbsnp_138.hg38.chrfix.vcf.gz"
    gc_bias_index: "/path/to/hg38/GCA_000001405.15_GRCh38_no_alt_analysis_set.fa.500.gc"
    rtg_install: "/path/to/rtg"
    gcbias_python: "/path/to/python"
    general_python: "/path/to/python"
    tabix: "/opt/cgi-tools/bin/tabix"
    hapcut2: "/path/to/hapcut2/bin"

    bcftools: "/opt/cgi-tools/bin/bcftools"
    hapcut_link_dist: 100000
    longhap: "/path/to/LongHap.pl"
    wenlan_python: "/opt/cgi-anaconda2-4.4.0/bin/python"

    # mRNA mapper tools (required when library_type: 'mrna')
    star: "/path/to/STAR"
    star_index: "/path/to/star_index"
    hisat2: "/path/to/hisat2"
    hisat2_index: "/path/to/hisat2_index"
    hisat2_splicesites: "/path/to/splicesites.txt"

calc_frag:
    ########### start fill ###
    # stLFR defaults: minreads=4, mapping_quality=30
    minreads: 'default'
    mapping_quality: 'default'
    min_frag: 500
    minreads_fasta: 100
    calc_bc_condition: ''
    ########### end fill ###

    n_tolerance: 2
    split_dist: [50000]
    include_dups: True
    ray_mem: "200,1024,100,1024"
    writeouttsvs: True
    num_bin_in_frag: 10
    ylim: 50

longhap:
    win_size: 10000000
    max_lfr_len: 300000
    min_barcode: 1
    min_link: 1

benchmark:
    benchmark_snp: "/path/to/hg38_GIAB_HG001/benchmark_snp.chrfix.vcf.gz"
    benchmark_indel: "/path/to/hg38_GIAB_HG001/benchmark_indel.chrfix.vcf.gz"
    bedfile: "/path/to/hg38_GIAB_HG001/benchmark_bed.chrfix.bed"
    ref_sdf: "/path/to/hg38_benchmark_ref/GRCh38.sdf"
    truth_vcf_dir: ""
    vcf_benchmark: ""

threads:
    bwa: 100
    haplotyper: 100
    metrics: 10
    gnu_parallel: 20
    calc_frag: 4
    split_group: 80
    quast: 4
    supernova: 100
